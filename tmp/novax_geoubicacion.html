<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes y Geolocalización</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input,
        button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #map {
            height: 400px;
            width: 100%;
            margin-top: 20px;
        }

        #contador {
            font-weight: bold;
            margin-top: 10px;
        }

        .cliente-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .cliente-item button {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        .cliente-item button:hover {
            background-color: #d32f2f;
        }
    </style>
</head>

<body>
    <h1>Aplicación de Gestión de Clientes y Geolocalización</h1>

    <div class="section">
        <h2>Registrar mi ubicación</h2>
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="ci" placeholder="CI (Carnet de Identidad)" required>
            <input type="text" id="telefono" placeholder="Teléfono" required>
            <button type="button" id="obtenerUbicacion">Obtener Ubicación</button>
        </form>
        <div id="contador">Clientes registrados: 0</div>
        <div id="clientesLista"></div>
    </div>

    <div class="section">
        <h2>Ver clientes en mapa</h2>
        <div>
            <select id="busquedaTipo">
                <option value="nombre">Nombre</option>
                <option value="ci">CI</option>
            </select>
            <input type="text" id="busquedaTexto" placeholder="Buscar cliente...">
            <button id="buscarCliente">Buscar Cliente</button>
        </div>
        <button id="mostrarMapa">Mostrar Clientes en el Mapa</button>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Datos de ejemplo
        let clientes = [
            { nombre: 'Juan Pérez', ci: '1234567', telefono: '70123456', lat: -17.3895, lng: -66.1568 },
            { nombre: 'María García', ci: '2345678', telefono: '70234567', lat: -17.3900, lng: -66.1570 },
            { nombre: 'Carlos López', ci: '3456789', telefono: '70345678', lat: -17.3880, lng: -66.1550 },
            { nombre: 'Ana Martínez', ci: '4567890', telefono: '70456789', lat: -17.3910, lng: -66.1580 },
            { nombre: 'Luis Rodríguez', ci: '5678901', telefono: '70567890', lat: -17.3870, lng: -66.1540 },
            { nombre: 'Sofia Fernández', ci: '6789012', telefono: '70678901', lat: -17.3920, lng: -66.1590 }
        ];
        let map;
        let userLocation = null;

        const novaxIcon = L.icon({
            iconUrl: 'imagenes/logonovax.png',
            iconSize: [40, 40], // Ajustar tamaño según la imagen
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        async function getAddress(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data.address && data.address.road) {
                    let address = data.address.road;
                    if (data.address.house_number) {
                        address += ' ' + data.address.house_number;
                    }
                    // Intentar determinar entre calles si hay info adicional
                    if (data.address.neighbourhood || data.address.suburb) {
                        address += ', ' + (data.address.neighbourhood || data.address.suburb);
                    }
                    return address;
                } else {
                    // Fallback a display_name simplificado
                    return data.display_name ? data.display_name.split(',')[0] : 'Dirección no encontrada';
                }
            } catch (error) {
                return 'Error al obtener dirección';
            }
        }

        // Inicializar
        actualizarContador();
        actualizarListaClientes();

        document.getElementById('obtenerUbicacion').addEventListener('click', () => {
            const nombre = document.getElementById('nombre').value.trim();
            const ci = document.getElementById('ci').value.trim();
            const telefono = document.getElementById('telefono').value.trim();

            if (!nombre || !ci || !telefono) {
                alert('Por favor, ingresa nombre, CI y teléfono.');
                return;
            }

            // Verificar CI único
            if (clientes.some(c => c.ci === ci)) {
                alert('Ya existe un cliente con ese CI.');
                return;
            }

            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    clientes.push({ nombre, ci, telefono, lat: latitude, lng: longitude });
                    actualizarContador();
                    actualizarListaClientes();
                    document.getElementById('registroForm').reset();
                },
                (error) => {
                    alert('Error al obtener ubicación: ' + error.message);
                }
            );
        });

        document.getElementById('mostrarMapa').addEventListener('click', () => {
            if (clientes.length === 0) {
                alert('No hay clientes registrados.');
                return;
            }

            // Obtener ubicación del usuario para centrar y mostrar
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    userLocation = { lat: latitude, lng: longitude };

                    // Inicializar mapa centrado en la ubicación del usuario
                    if (map) {
                        map.remove();
                    }
                    map = L.map('map').setView([latitude, longitude], 13);

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(map);

                    // Marcador para ubicación del usuario
                    userMarker = L.marker([latitude, longitude], { icon: novaxIcon })
                        .addTo(map)
                        .bindPopup("Novax");

                    // Evento para cerrar popup al salir el mouse
                    userMarker.on('popupopen', function () {
                        const popup = this.getPopup();
                        const element = popup.getElement();
                        element.addEventListener('mouseleave', () => {
                            this.closePopup();
                        });
                    });

                    // Agregar marcadores de clientes
                    clientes.forEach(async (cliente) => {
                        const marker = L.marker([cliente.lat, cliente.lng]).addTo(map);
                        marker.bindTooltip(cliente.nombre, { permanent: true, direction: 'top' });
                        marker.bindPopup('Cargando dirección...');
                        const address = await getAddress(cliente.lat, cliente.lng);
                        marker.setPopupContent(`<b>${cliente.nombre}</b><br>CI: ${cliente.ci}<br>Teléfono: ${cliente.telefono}<br>Dirección: ${address}<br>Lat: ${cliente.lat.toFixed(6)}<br>Lng: ${cliente.lng.toFixed(6)}`);
                    });

                    // Agregar control para toggle ubicación actual
                    const control = L.control({ position: 'topright' });
                    control.onAdd = function (map) {
                        const div = L.DomUtil.create('div', 'location-control');
                        div.innerHTML = '<button id="toggleLocation" style="background: red; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">📍 Ocultar Ubicación</button>';
                        L.DomEvent.on(div.firstChild, 'click', function (e) {
                            L.DomEvent.stopPropagation(e);
                            const button = e.target;
                            if (userMarker) {
                                if (map.hasLayer(userMarker)) {
                                    map.removeLayer(userMarker);
                                    button.textContent = '📍 Mostrar Ubicación';
                                } else {
                                    map.addLayer(userMarker);
                                    button.textContent = '📍 Ocultar Ubicación';
                                }
                            }
                        });
                        return div;
                    };
                    control.addTo(map);
                },
                (error) => {
                    alert('Error al obtener ubicación para el mapa: ' + error.message);
                    // Si falla, centrar en Cochabamba y mostrar solo clientes
                    if (map) {
                        map.remove();
                    }
                    map = L.map('map').setView([-17.3895, -66.1568], 13);

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(map);

                    clientes.forEach(async (cliente) => {
                        const marker = L.marker([cliente.lat, cliente.lng]).addTo(map);
                        marker.bindTooltip(cliente.nombre, { permanent: true, direction: 'top' });
                        marker.bindPopup('Cargando dirección...');
                        const address = await getAddress(cliente.lat, cliente.lng);
                        marker.setPopupContent(`<b>${cliente.nombre}</b><br>CI: ${cliente.ci}<br>Teléfono: ${cliente.telefono}<br>Dirección: ${address}<br>Lat: ${cliente.lat.toFixed(6)}<br>Lng: ${cliente.lng.toFixed(6)}`);
                    });
                }
            );
        });

        document.getElementById('buscarCliente').addEventListener('click', () => {
            if (!map) {
                alert('Primero muestra el mapa.');
                return;
            }
            const tipo = document.getElementById('busquedaTipo').value;
            const texto = document.getElementById('busquedaTexto').value.trim();
            if (!texto) {
                alert('Ingresa un valor para buscar.');
                return;
            }
            const cliente = clientes.find(c => c[tipo].toLowerCase() === texto.toLowerCase());
            if (cliente) {
                map.setView([cliente.lat, cliente.lng], 18); // Zoom alto para centrar
            } else {
                alert('Cliente no existe.');
            }
        });

        function actualizarContador() {
            document.getElementById('contador').textContent = `Clientes registrados: ${clientes.length}`;
        }

        function actualizarListaClientes() {
            const lista = document.getElementById('clientesLista');
            lista.innerHTML = '';
            clientes.forEach((cliente, index) => {
                const item = document.createElement('div');
                item.className = 'cliente-item';
                item.innerHTML = `
                    <span>${cliente.nombre} - CI: ${cliente.ci} - Tel: ${cliente.telefono}</span>
                    <button onclick="borrarCliente(${index})">Borrar</button>
                `;
                lista.appendChild(item);
            });
        }

        function borrarCliente(index) {
            clientes.splice(index, 1);
            actualizarContador();
            actualizarListaClientes();
        }
    </script>
</body>

</html>
